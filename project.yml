name: DayOS
options:
  bundleIdPrefix: com.dayos
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  xcodeVersion: "15.0"

targets:
  DayOS:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dayos.app
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_ENTITLEMENTS: DayOS.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: DayOS.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
